# === Google GenAI (Native) ===
embabel.models.default-llm=gemini-2.5-flash
embabel.models.default-embedding-model=gemini-embedding-001

embabel.agent.platform.ranking.llm=gemini-2.5-flash-lite
embabel.models.llms.cheapest=gemini-2.5-flash-lite
embabel.models.llms.normal=gemini-2.5-flash

embabel.agent.platform.models.googlegenai.api-key=${GEMINI_API_KEY}

